app = "mcp-touchline"
primary_region = "sin"

[build]
  dockerfile = "mcp/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[deploy]
  release_command = "python -c 'from config.db import get_conn; get_conn().close(); print(\"DB OK\")'"
