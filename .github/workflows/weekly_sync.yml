name: Weekly Data Sync

on:
  schedule:
    - cron: "0 6 * * 2"  # Every Tuesday at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      SUPABASE_HOST: ${{ secrets.SUPABASE_HOST }}
      SUPABASE_PORT: ${{ secrets.SUPABASE_PORT }}
      SUPABASE_DB: ${{ secrets.SUPABASE_DB }}
      SUPABASE_USER: ${{ secrets.SUPABASE_USER }}
      SUPABASE_PASSWORD: ${{ secrets.SUPABASE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,airflow,dbt]"

      - name: Ingest football data
        run: python airflow/dags/football_ingestion.py
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: dbt run
        run: dbt run --profiles-dir ./ --profile ci
        working-directory: dbt

      - name: dbt test
        run: dbt test --profiles-dir ./ --profile ci
        working-directory: dbt

      - name: Generate match narratives and embeddings
        run: python src/football_analytics/agent/generate_and_store_narratives.py --yes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
