football_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      port: 5432
      user: football
      password: football
      dbname: football_db
      schema: staging
      threads: 4

ci:
  target: default
  outputs:
    default:
      type: postgres
      host: "{{ env_var('FOOTBALL_DB_HOST', 'localhost') }}"
      port: "{{ env_var('FOOTBALL_DB_PORT', '5432') | int }}"
      user: "{{ env_var('FOOTBALL_DB_USER') }}"
      password: "{{ env_var('FOOTBALL_DB_PASSWORD') }}"
      dbname: "{{ env_var('FOOTBALL_DB_NAME') }}"
      schema: marts
      threads: 4
