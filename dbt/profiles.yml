football_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: postgres
      port: 5432
      user: football
      password: football
      dbname: football_db
      schema: staging
      threads: 4

ci:
  target: default
  outputs:
    default:
      type: postgres
      host: "{{ env_var('SUPABASE_HOST') }}"
      port: "{{ env_var('SUPABASE_PORT', '5432') | int }}"
      user: "{{ env_var('SUPABASE_USER') }}"
      password: "{{ env_var('SUPABASE_PASSWORD') }}"
      dbname: "{{ env_var('SUPABASE_DB', 'postgres') }}"
      schema: public
      sslmode: require
      threads: 4
